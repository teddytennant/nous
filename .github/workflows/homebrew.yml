name: Update Homebrew Formula

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets and compute checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="${GITHUB_REF#refs/tags/}"

          FORMULA="packaging/homebrew/nous.rb"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            asset="nous-${TAG}-${target}.tar.gz"
            url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${asset}"
            sha=$(curl -fsSL "$url" | sha256sum | cut -d' ' -f1)
            # Replace the sha256 line following this target's URL
            sed -i "/${target}\.tar\.gz/{n;s/sha256 \".*\"/sha256 \"${sha}\"/}" "$FORMULA"
          done

      - name: Update formula in this repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/homebrew/nous.rb
          git diff --cached --quiet || git commit -m "Update Homebrew formula to ${GITHUB_REF#refs/tags/}"
          git push

      - name: Push formula to homebrew-tap repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAPDIR=$(mktemp -d)
          git clone "https://x-access-token:${GH_TOKEN}@github.com/teddytennant/homebrew-tap.git" "$TAPDIR"
          cp packaging/homebrew/nous.rb "$TAPDIR/Formula/nous.rb"
          cd "$TAPDIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nous.rb
          git diff --cached --quiet || git commit -m "Update nous to ${GITHUB_REF#refs/tags/}"
          git push
